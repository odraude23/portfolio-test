repos:
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]

  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        language: system
        entry: semgrep
        args: [--config=auto, --error]
        types: [text]
        pass_filenames: false
