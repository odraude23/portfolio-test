env:
  contexts:
  - name: "juice-shop"
    urls:
    - "http://localhost:3000"
    includePaths: []
    # Tell ZAP to NEVER scan or click on the logout path to avoid losing the session
    excludePaths:
    - "http://localhost:3000/rest/user/logout"

    # Define Authentication Strategy (Juice Shop uses JSON authentication)
    authentication:
      method: "json"
      parameters:
        loginPageUrl: "http://localhost:3000/#/login"
        loginRequestUri: "http://localhost:3000/rest/user/login"
        loginRequestBody: '{"email":"{%username%}","password":"{%password%}"}'
      # How ZAP verifies if the login was successful by looking at the response body
      verification:
        method: "response"
        loggedOutRegex: "401 Unauthorized"
        loggedInRegex: ".*token.*"

    # Define the Users
    users:
    - name: "admin-user"
      credentials:
        username: "admin@juice-sh.op"
        password: "admin123"

jobs:
# Step 1: Import all API endpoints directly from the OpenAPI spec
- type: openapi
  parameters:
    apiUrl: "http://localhost:3000/api-docs"
    context: "juice-shop"

# Step 2: Traditional spider for non-API pages (runs authenticated)
- type: spider
  parameters:
    context: "juice-shop"
    user: "admin-user"
    url: "http://localhost:3000"
    maxDuration: 2

# Step 3: Actively attack all discovered endpoints
- type: activeScan
  parameters:
    context: "juice-shop"
    user: "admin-user"
    maxRuleDurationInMins: 1
    maxScanDurationInMins: 2
  policyDefinition:
    defaultStrength: High
    defaultThreshold: Low

# Step 4: Generate HTML report
- type: report
  parameters:
    template: traditional-html
    reportDir: /zap/wrk
    reportFile: zap-report.html
    reportTitle: "ZAP Nightly Full Scan Report"
