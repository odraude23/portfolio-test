name: PR Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  trivy:
    name: Trivy — Dependency & Container Scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scan and save results as JSON — exit-code 0 so we post the comment before failing
      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: bkimminich/juice-shop:latest
          severity: HIGH,CRITICAL
          format: json
          output: trivy-report.json
          exit-code: '0'

      # Post findings as a PR comment with collapsible table
      - name: Post Trivy results as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8'));

            const vulns = (report.Results || []).flatMap(r => r.Vulnerabilities || []);
            const critical = vulns.filter(v => v.Severity === 'CRITICAL').length;
            const high = vulns.filter(v => v.Severity === 'HIGH').length;

            let body = `## Trivy — Image Scan Results\n\n`;
            if (vulns.length === 0) {
              body += 'No HIGH or CRITICAL vulnerabilities found.';
            } else {
              body += `**${vulns.length} vulnerabilities found** — CRITICAL: ${critical}, HIGH: ${high}\n\n`;
              body += `<details>\n<summary>View full findings</summary>\n\n`;
              body += `| Package | CVE | Severity | Installed | Fixed |\n`;
              body += `|---------|-----|----------|-----------|-------|\n`;
              for (const v of vulns) {
                body += `| ${v.PkgName} | ${v.VulnerabilityID} | ${v.Severity} | ${v.InstalledVersion} | ${v.FixedVersion || 'N/A'} |\n`;
              }
              body += `\n</details>`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # Now fail the job if any HIGH or CRITICAL were found
      - name: Fail if HIGH or CRITICAL vulnerabilities found
        run: |
          python3 -c "
          import json, sys
          with open('trivy-report.json') as f:
              report = json.load(f)
          vulns = [v for r in report.get('Results', []) for v in r.get('Vulnerabilities', []) or []]
          blocking = [v for v in vulns if v.get('Severity') in ('HIGH', 'CRITICAL')]
          if blocking:
              print(f'Trivy found {len(blocking)} HIGH/CRITICAL vulnerabilities — failing the job')
              sys.exit(1)
          print('No HIGH or CRITICAL vulnerabilities found — passing')
          "

  zap-baseline:
    name: ZAP — Baseline DAST Scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post PR comment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:latest

      - name: Wait for Juice Shop to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && echo "Juice Shop is ready" && break
            echo "Waiting... ($i/30)"
            sleep 5
          done

      # Unauthenticated passive scan — no token so it doesn't create a GitHub Issue
      # fail_action: false so we control failure ourselves after posting the comment
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
        continue-on-error: true

      # Upload HTML report as artifact
      - name: Upload ZAP report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report-pr-${{ github.event.pull_request.number }}
          path: report_html.html
          retention-days: 7

      # Post the markdown report as a PR comment
      - name: Post ZAP results as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report_md.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ZAP Baseline Scan Results\n\n${report}`
            });

      # Fail the job only if ZAP found Medium or High alerts (riskcode >= 2)
      - name: Fail if Medium or High alerts found
        run: |
          python3 -c "
          import json
          with open('report_json.json') as f:
              report = json.load(f)
          alerts = report.get('site', [{}])[0].get('alerts', [])
          blocking = [a for a in alerts if int(a.get('riskcode', 0)) >= 2]
          if blocking:
              print(f'ZAP found {len(blocking)} Medium/High alert(s) — failing the job')
              exit(1)
          print('No Medium or High alerts found — passing')
          "

  sonarcloud:
    name: SonarCloud — Code Quality & Security Hotspots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: juice-shop-src
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,dist/**,build/**
