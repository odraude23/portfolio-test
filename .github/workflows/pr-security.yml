name: PR Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  trivy:
    name: Trivy — Dependency & Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scan the Juice Shop Docker image — fails job if HIGH/CRITICAL found
      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: bkimminich/juice-shop:latest
          severity: HIGH,CRITICAL
          format: table
          exit-code: '1'

  zap-baseline:
    name: ZAP — Baseline DAST Scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post PR comment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:latest

      - name: Wait for Juice Shop to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && echo "Juice Shop is ready" && break
            echo "Waiting... ($i/30)"
            sleep 5
          done

      # Unauthenticated passive scan — no token so it doesn't create a GitHub Issue
      # fail_action: false so we control failure ourselves after posting the comment
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
        continue-on-error: true

      # Upload HTML report as artifact
      - name: Upload ZAP report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report-pr-${{ github.event.pull_request.number }}
          path: report_html.html
          retention-days: 7

      # Post the markdown report as a PR comment
      - name: Post ZAP results as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report_md.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ZAP Baseline Scan Results\n\n${report}`
            });

      # Fail the job if ZAP found any alerts
      - name: Fail if alerts found
        run: |
          python3 -c "
          import json
          with open('report_json.json') as f:
              report = json.load(f)
          alerts = report.get('site', [{}])[0].get('alerts', [])
          if alerts:
              print(f'ZAP found {len(alerts)} alert(s) — failing the job')
              exit(1)
          print('No alerts found')
          "

  sonarcloud:
    name: SonarCloud — Code Quality & Security Hotspots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: juice-shop-src
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,dist/**,build/**
