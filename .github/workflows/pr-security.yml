name: PR Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  trivy:
    name: Trivy — Dependency & Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scan the Juice Shop Docker image — fails job if HIGH/CRITICAL found
      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: bkimminich/juice-shop:latest
          severity: HIGH,CRITICAL
          format: table
          exit-code: '1'

  zap-baseline:
    name: ZAP — Baseline DAST Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write         # needed to post PR comment with findings
      pull-requests: write  # needed to post PR comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:latest

      - name: Wait for Juice Shop to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && echo "Juice Shop is ready" && break
            echo "Waiting... ($i/30)"
            sleep 5
          done

      # Unauthenticated passive scan — checks misconfigurations and missing headers
      # Posts results as a PR comment, fails job if any MEDIUM or higher alerts found
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: true
          issue_title: 'ZAP Baseline Scan — PR #${{ github.event.pull_request.number }}'

  sonarcloud:
    name: SonarCloud — Code Quality & Security Hotspots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: juice-shop-src
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,dist/**,build/**
